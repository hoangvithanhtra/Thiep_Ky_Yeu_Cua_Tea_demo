<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Yearbook Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

@font-face{
font-family:'Everything';
src:url('Everything.ttf') format('truetype');
}

@font-face{
font-family:'slight-regular';
src:url('slight-regular.ttf') format('truetype');
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f6cbd6;
font-family:'Montserrat',sans-serif;
overflow:hidden;
}

/* BACKGROUND TEXT */

.bgContainer{
position:absolute;
top:2%;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
transform:rotate(-12deg) translateX(60px);
pointer-events:none;
z-index:0;
}

.bgText{
font-family:'Everything';
font-size:210px;
letter-spacing:6px;
color:rgba(255,255,255,0.55);
transform:translateX(-120px);
text-shadow:
0 0 25px rgba(255,255,255,0.7),
0 0 60px rgba(255,255,255,0.5);
}

.bgText2{
font-family:'Everything';
font-size:95px;
letter-spacing:5px;
margin-top:-140px;
color:rgba(255,255,255,0.55);
text-shadow:
0 0 20px rgba(255,255,255,0.6),
0 0 50px rgba(255,255,255,0.4);
}

/* ENVELOPE */

.envelope{
position:absolute;
left:50%;
transform:translateX(-50%);
width:95vw;
max-width:520px;
height:280px;
background:#f2e7dc;
border-radius:12px;
box-shadow:0 20px 70px rgba(0,0,0,0.25);
cursor:pointer;
z-index:2;
top:55%;
}

.envelope:before{
content:'';
position:absolute;
width:100%;
height:100%;
background:#eaded2;
clip-path:polygon(0 0,50% 70%,100% 0);
transform-origin:top;
transition:0.8s;
}

.open:before{
transform:rotateX(-180deg);
}

/* BOW */

.bow{
position:absolute;
top:70%;
left:50%;
transform:translate(-50%,-50%);
width:95px;
}

/* LETTER */
.letter{
position:absolute;
width:96vw; /* 🔥 chỉnh to hơn */
max-width:520px; /* 🔥 chỉnh to hơn */
background:url("paper.jpg");
background-size:cover;
background-position:center;
border-radius:20px;
padding:70px 40px;
box-sizing:border-box;
top:0;
left:50%;
transform:translate(-50%,60px);
opacity:0;
transition:1.2s;
box-shadow:0 30px 90px rgba(0,0,0,0.3);
min-height:650px; /* 🔥 thêm chiều cao cho thoáng */
overflow:hidden;
}

.open .letter{
transform:translate(-50%,-300px); /* 🔥 giữ cân giữa */
opacity:1;
}

/* FLORAL */

.floral{
position:absolute;
top:-20px;
right:-20px;
width:300px;
}

/* BUTTERFLIES */

.butterfly1{
position:absolute;
top:40px;
left:35px;
width:55px;
transform:rotate(-10deg);
pointer-events:none;
}

.butterfly2{
position:absolute;
top:120px;
left:90px;
width:60px;
transform:scaleX(-1) rotate(15deg);
pointer-events:none;
}

/* TEXT BLOCK BOTTOM LEFT */

.textBlock{
position:absolute;
bottom:30px;
left:30px;
width:80%;
}

/* NEW TOP TEXT */

.topInvite{
font-family:'slight-regular';
text-align:left;
font-size:22px;
color:#b86b7c;
white-space:nowrap;
margin:0;
line-height:1.18;
}

/* NAME */

.name{
font-family:'slight-regular';
font-size:50px;
color:#b86b7c;
text-align:left;
opacity:0;
line-height:1.15;
margin:0;
}

.showName{
animation:appear 2s forwards;
}

@keyframes appear{
0%{opacity:0;letter-spacing:8px}
100%{opacity:1;letter-spacing:1px}
}

/* SUBTITLE GOLD */

.subtitle{
font-family:'Playfair Display',serif;
font-style:italic;
color:#c9a227;
text-align:left;
font-size:15px;
line-height:1.18;
margin:5px 0;
}

/* DATE SECTION */

.dateBox{
display:flex;
align-items:center;
justify-content:flex-start;
gap:12px;
margin:5px 0 0 0;
}

.dateLeft{
text-align:left;
font-family:'Playfair Display',serif;
}

.month{
font-size:18px;
letter-spacing:2px;
color:#b86b7c;
line-height:0.9;
}

.day{
font-size:56px;
color:#c9a227;
font-weight:500;
line-height:0.85;
margin-top:-2px;
}

.dateDivider{
width:1px;
height:65px;
background:#d7c3b3;
}

.dateRight{
font-family:'Playfair Display',serif;
color:#b86b7c;
font-size:19px;
line-height:1.3;
}

.address{
margin-top:3px;
font-size:17px;
color:#b86b7c;
}

/* MOBILE */

@media(max-width:480px){

.bgText{
font-size:120px;
}

.bgText2{
font-size:60px;
margin-top:-70px;
}

.envelope{
margin-top:200px;
}

}

/* PHOTOBOOTH */

.photobooth{
position:absolute;
top:-240px;
left:50%;
transform:translateX(-50%) rotate(0deg);
opacity:0;
transition:1.2s;
}

.photobooth img{
width:170px;
display:block;
border-left:10px solid white;
border-right:10px solid white;
}

.photobooth img:first-child{
border-top:10px solid white;
border-bottom:8px solid white;
border-radius:12px 12px 0 0;
}

.photobooth img:last-child{
border-bottom:10px solid white;
border-radius:0 0 12px 12px;
}

.open .photobooth{
transform:translate(120%,-20px) rotate(8deg); /* 🔥 ảnh sang phải */
opacity:1;
}

/* --- TÍNH NĂNG MỚI --- */

@media (max-width: 768px) {
    .open .letter {
        transform: translate(-50%, -310px) scale(0.85);
        left: 50%;
    }
    .open .photobooth {
        transform: translate(60%, -40px) rotate(8deg) scale(0.85);
    }
}

@media (max-width: 480px) {
    .open .letter {
        transform: translate(-50%, -280px) scale(0.65);
    }
    .open .photobooth {
        transform: translate(45%, -60px) rotate(8deg) scale(0.65);
    }
}

@media (max-height: 700px) {
    .open .letter, .open .photobooth {
        margin-top: 50px;
    }
}

</style>
</head>

<body>

<div class="bgContainer">
<div class="bgText">Yearbook</div>
<div class="bgText2">Invitation</div>
</div>

<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="envelope" onclick="openLetter(this)">

<img src="bow.png" class="bow">

<div class="letter">

<img src="floral.png" class="floral">
<img src="pink-butterflies.png" class="butterfly1">
<img src="pink-butterflies.png" class="butterfly2">

<div class="textBlock">

<div class="topInvite">
Join us for a yearbook from:
</div>

<div class="name" id="nameText">
Hoàng Vi Thanh Trà
</div>

<div class="subtitle">
Sẽ thật tuyệt vời nếu trong bức ảnh thanh xuân của tôi có sự góp mặt của bạn
<br>
-------
<br>
It would be truly wonderful if you were part of the memories captured in my youth photos
</div>

<div class="dateBox">

<div class="dateLeft">
<div class="month">APRIL</div>
<div class="day">12</div>
</div>

<div class="dateDivider"></div>

<div class="dateRight">
2026<br>
10:30 AM - 12:30 AM
<div class="address">
VietBac High School
</div>
</div>

</div>

</div>

</div>

<div class="photobooth">
<img src="photo1.jpg">
<img src="photo2.jpg">
</div>

</div>

<script>

function openLetter(el){

el.classList.toggle("open");

let music=document.getElementById("bgMusic");
music.volume=0;
music.play();

let fade=setInterval(()=>{
if(music.volume<0.9){
music.volume+=0.02;
}else{
clearInterval(fade);
}
},80);

setTimeout(()=>{
document.getElementById("nameText").classList.add("showName");
},800);

}

</script>

</body>
</html>
